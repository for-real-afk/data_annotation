# YOLO11s-Seg Production-Grade Training Parameters

model: yolo11s-seg.pt
dataset_config: dataset.yaml

training:
  epochs: 100
  imgsz: 1024
  batch: 16
  device: 0
  cache: true
  amp: true
  workers: 4
  patience: 20
  project: bom_project
  name: yolo11s_seg
  plots: true
  save: true
  save_period: 5
  optimizer: AdamW
  cos_lr: true
  close_mosaic: 10
  resume: true

augmentations:
  degrees: 3.0
  translate: 0.05
  scale: 0.15
  shear: 1.0
  perspective: 0.0005
  mosaic: 0.5
  mixup: 0.1
  flipud: 0.0
  fliplr: 0.0
